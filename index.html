<head>

    <link href="css/estilo.css" rel="stylesheet" type="text/css" />

</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <!-- sticky-top -> fixo no topo com espaço com conteúdo abaixo)-->
        <a class="navbar-brand" href="index.html">Ordenador</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"

        </button>

    <br><br><br><br><br><br><br>
    <div class="container mt-3">
        <div class="row mb-3">
            <div class="col-md-12 col-sm-12 mb-2">

                <div class="form-group">
                    <label for="x">Valor1</label>
                    <input type="number" step="0.5" class="form-control" id="x" name="x" value>
                </div>
                <div class="form-group">
                    <label for="y">Valor2</label>
                    <input type="number" step="0.5" class="form-control" id="y" name="y" value>
                </div>
                <div class="form-group">
                    <label for="txtvalor3">valor3</label>
                    <input type="number" step="0.5" class="form-control" id="z" name="z" value>
                </div>

                <button id="calcular" class="btn btn-danger">Calcular</button>

            </div>
            <div class="col-md-12 col-sm-12 mb-2">
                <div class="alert alert-primary" role="alert">
                    <p id="txtresultado">Resultado: </p>
                </div>
            </div>
        </div>
    </div>
